name: Project — Triage New Issues

# Polls the org every 15 minutes for open issues that aren't on the project
# yet, adds them, and sets Status = "To Triage". Auto-discovers new repos in
# the org with no per-repo configuration.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log changes without applying them"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: project-triage-new-issues
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install --no-audit --no-fund
      - name: Add untriaged issues to project
        working-directory: .github/scripts
        env:
          PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
          PROJECT_OWNER: griptape-ai
          PROJECT_NUMBER: "2"
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node triage-new-issues.mjs
